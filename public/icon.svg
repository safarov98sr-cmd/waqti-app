<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0A1628"/>
  <!-- Emerald circle bg -->
  <circle cx="256" cy="256" r="180" fill="#10B981" opacity="0.15"/>
  <!-- Clock face -->
  <circle cx="256" cy="256" r="148" stroke="#10B981" stroke-width="16" fill="none"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#10B981"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="256" y1="256" x2="186" y2="158" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <line x1="256" y1="256" x2="340" y2="186" stroke="#F59E0B" stroke-width="14" stroke-linecap="round"/>
  <!-- Star accent (top) -->
  <polygon points="256,68 263,90 286,90 268,103 275,126 256,113 237,126 244,103 226,90 249,90"
    fill="#F59E0B" opacity="0.9"/>
</svg>
